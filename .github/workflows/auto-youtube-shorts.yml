name: Auto YouTube Shorts

on:
  workflow_dispatch:
  schedule:
    # 20:00, 23:00, 02:00 UTC => 21:00, 00:00, 03:00 in Africa/Casablanca
    # while the local offset is UTC+1.
    - cron: "0 20,23,2 * * *"

permissions:
  contents: write

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 yt-dlp

      - name: Write YouTube Secrets
        env:
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          mkdir -p .secrets
          printf '%s' "$YOUTUBE_CLIENT_SECRET_JSON" > .secrets/youtube-client-secret.json
          printf '%s' "$YOUTUBE_TOKEN_JSON" > .secrets/youtube-token.json

      - name: Write Auto Reciter Library
        env:
          AUTO_RECITER_LIBRARY_JSON: ${{ secrets.AUTO_RECITER_LIBRARY_JSON }}
        run: |
          mkdir -p .secrets
          if [ -n "$AUTO_RECITER_LIBRARY_JSON" ]; then
            printf '%s' "$AUTO_RECITER_LIBRARY_JSON" > .secrets/auto-reciters.json
          fi

      - name: Generate And Upload YouTube Short
        run: |
          python ./main.py \
            --auto \
            --count 1 \
            --target-seconds 60 \
            --youtube-upload \
            --youtube-client-secrets-file ./.secrets/youtube-client-secret.json \
            --youtube-token-file ./.secrets/youtube-token.json \
            --youtube-privacy-status public \
            --youtube-tags "quran,shorts,islam,quran recitation,peaceful quran"


      - name: Persist Auto History
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain .cache/auto_history.json)" ]; then
            git add .cache/auto_history.json
            git commit -m "chore: update auto history"
            git pull --rebase origin main || true
            git push
          else
            echo "No auto history changes to commit."
          fi
